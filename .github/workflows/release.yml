name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build pinentry-dms (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-arch system deps (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          arch=${{ matrix.target }}
          mkdir -p staging/bin
          cp target/${arch}/release/pinentry-dms staging/bin/
          cp README.md CHANGELOG.md LICENSE Cargo.toml staging/ 2>/dev/null || true
          tar -C staging -czf pinentry-dms-${arch}.tar.gz .
          sha256sum pinentry-dms-${arch}.tar.gz > pinentry-dms-${arch}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: pinentry-dms-${{ matrix.target }}
          path: |
            pinentry-dms-${{ matrix.target }}.tar.gz
            pinentry-dms-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pinentry-dms-*.tar.gz
            dist/pinentry-dms-*.tar.gz.sha256