name: release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'plugin/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/release.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'plugin/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  lint-commits:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          set -euo pipefail
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?!?: .{1,72}$'
          rc=0
          for sha in $(git rev-list --grep='' origin/${{ github.base_ref }}..HEAD 2>/dev/null || git rev-list HEAD~10..HEAD); do
            subj="$(git log -1 --format='%s' "$sha")"
            if ! printf '%s' "$subj" | grep -Eq "$pattern"; then
              echo "::error::commit $sha not Conventional Commits: '$subj'"
              echo "   expected: <type>(<scope>)?: <description> (feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)"
              rc=1
            fi
          done
          exit $rc

  check:
    name: fmt + clippy + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo build --locked --all-targets
      - run: cargo test --locked

  build:
    name: Build binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Verify binary
        run: |
          test -x "target/${{ matrix.target }}/release/pinentry-dms"
          file "target/${{ matrix.target }}/release/pinentry-dms"
      - name: Stage raw binary + sha256 (no archive)
        run: |
          arch=${{ matrix.target }}
          version=$(grep -m1 '^version = "' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          out="pinentry-dms-${version}-${arch}"
          cp "target/${arch}/release/pinentry-dms" "${out}"
          chmod +x "${out}"
          sha256sum "${out}" > "${out}.sha256"
          echo "--- staged binary ---"
          ls -la "${out}" "${out}.sha256"
          file "${out}"
      - uses: actions/upload-artifact@v4
        with:
          name: pinentry-dms-${{ matrix.target }}
          path: |
            pinentry-dms-*-${{ matrix.target }}
            pinentry-dms-*-${{ matrix.target }}.sha256

  package-plugin:
    name: Package DMS plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create plugin tar.gz (plugin/ only)
        run: |
          version=$(grep -m1 '^version = "' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          out="pinentry-dms-plugin-${version}.tar.gz"
          tar -C plugin -czf "${out}" .
          sha256sum "${out}" > "${out}.sha256"
          echo "--- plugin archive contents ---"
          tar -tzf "${out}"
          echo "--- staged ---"
          ls -la "${out}" "${out}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: pinentry-dms-plugin
          path: |
            pinentry-dms-plugin-*.tar.gz
            pinentry-dms-plugin-*.tar.gz.sha256

  detect-release:
    name: Detect version bump
    runs-on: ubuntu-latest
    needs: [check, build, package-plugin]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read Cargo.toml version
        id: ver
        run: |
          v=$(grep -m1 '^version = "' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if ! printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Cargo.toml version '$v' is not strict semver (X.Y.Z)"
            exit 1
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"
      - name: Check plugin.json matches Cargo.toml
        run: |
          cargo_v="${{ steps.ver.outputs.version }}"
          plugin_v=$(grep -m1 '"version"' plugin/plugin.json | sed 's/.*"\(.*\)".*/\1/')
          if [ "$cargo_v" != "$plugin_v" ]; then
            echo "::error::version mismatch: Cargo.toml=${cargo_v} plugin.json=${plugin_v}"
            exit 1
          fi
      - name: Check if tag v<version> already exists
        id: check
        run: |
          v="${{ steps.ver.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${v}" | grep -q .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag v${v} already exists — skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "new version v${v} detected — will release"
          fi

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [detect-release]
    if: needs.detect-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Verify release assets
        run: |
          set -e
          echo "--- dist/ contents ---"
          ls -la dist/
          version="${{ needs.detect-release.outputs.version }}"
          # 2 raw binaries + their sha256
          for arch in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            bin="dist/pinentry-dms-*-${arch}"
            if ! ls $bin >/dev/null 2>&1; then
              echo "::error::missing binary for ${arch}"; exit 1
            fi
            if ! ls ${bin}.sha256 >/dev/null 2>&1; then
              echo "::error::missing sha256 for ${arch}"; exit 1
            fi
          done
          # 1 plugin tar.gz + its sha256
          if ! ls dist/pinentry-dms-plugin-*.tar.gz >/dev/null 2>&1; then
            echo "::error::missing plugin tar.gz"; exit 1
          fi
          if ! ls dist/pinentry-dms-plugin-*.tar.gz.sha256 >/dev/null 2>&1; then
            echo "::error::missing plugin tar.gz sha256"; exit 1
          fi
          echo "all release assets present for v${version}"
          echo "--- binary types ---"
          file dist/pinentry-dms-* 2>/dev/null || true
      - name: Build changelog body (matching version section)
        run: |
          version="${{ needs.detect-release.outputs.version }}"
          section=$(awk -v v="${version}" '
            /^## \[/ { in_sec=0 }
            $0 ~ "^## \\[" v "\\]" { in_sec=1; next }
            in_sec { print }
          ' CHANGELOG.md)
          if [ -z "$section" ]; then
            echo "::warning::no CHANGELOG.md section for v${version}, using whole file"
            section=$(cat CHANGELOG.md)
          fi
          {
            echo "## Changelog"
            echo ""
            echo "$section"
          } > /tmp/release-body.md
          echo "--- body preview ---"
          cat /tmp/release-body.md
      - name: Create release (auto-creates tag v<version>)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-release.outputs.version }}
          name: v${{ needs.detect-release.outputs.version }}
          body_path: /tmp/release-body.md
          files: |
            dist/pinentry-dms-*-x86_64-unknown-linux-gnu
            dist/pinentry-dms-*-x86_64-unknown-linux-gnu.sha256
            dist/pinentry-dms-*-aarch64-unknown-linux-gnu
            dist/pinentry-dms-*-aarch64-unknown-linux-gnu.sha256
            dist/pinentry-dms-plugin-*.tar.gz
            dist/pinentry-dms-plugin-*.tar.gz.sha256
          fail_on_unmatched_files: true