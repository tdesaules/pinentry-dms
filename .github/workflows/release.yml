name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate semver tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Enforce strict semver (vX.Y.Z, no pre/build metadata)
        id: semver
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$tag" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::tag '$GITHUB_REF_NAME' is not strict semver (expected vX.Y.Z, no suffixes)"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "validated version: $tag"

  build:
    name: Build pinentry-dms (${{ matrix.target }})
    needs: validate-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Verify the binary exists
        run: |
          test -x "target/${{ matrix.target }}/release/pinentry-dms"
          file "target/${{ matrix.target }}/release/pinentry-dms"

      - name: Package (binary + DMS plugin + docs)
        run: |
          arch=${{ matrix.target }}
          version=${{ needs.validate-tag.outputs.version }}
          staging="pinentry-dms-${version}-${arch}"
          mkdir -p "${staging}/bin" "${staging}/plugin"
          cp "target/${arch}/release/pinentry-dms" "${staging}/bin/"
          cp -r plugin/. "${staging}/plugin/"
          cp README.md CHANGELOG.md LICENSE Cargo.toml "${staging}/"
          tar -C "${staging}" -czf "pinentry-dms-${version}-${arch}.tar.gz" .
          sha256sum "pinentry-dms-${version}-${arch}.tar.gz" > "pinentry-dms-${version}-${arch}.tar.gz.sha256"
          echo "--- archive contents ---"
          tar -tzf "pinentry-dms-${version}-${arch}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: pinentry-dms-${{ matrix.target }}
          path: |
            pinentry-dms-*-${{ matrix.target }}.tar.gz
            pinentry-dms-*-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish GitHub release
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify release assets
        run: |
          set -e
          ls -la dist/
          for arch in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            tgz="dist/pinentry-dms-*-${arch}.tar.gz"
            if ! ls $tgz >/dev/null 2>&1; then
              echo "::error::missing tarball for ${arch}"; exit 1
            fi
            if ! ls "${tgz}.sha256" >/dev/null 2>&1; then
              echo "::error::missing sha256 for ${arch}"; exit 1
            fi
          done
          echo "all release assets present"

      - name: Build changelog body (version section + fallback)
        id: body
        run: |
          version="${{ needs.validate-tag.outputs.version }}"
          section=$(awk -v v="${version}" '
            /^## \[/ { in_sec=0 }
            $0 ~ "^## \\[" v "\\]" { in_sec=1; next }
            in_sec { print }
          ' CHANGELOG.md)
          if [ -z "$section" ]; then
            echo "::warning::no CHANGELOG.md section for v${version}, using whole file"
            section=$(cat CHANGELOG.md)
          fi
          {
            echo "## Changelog"
            echo ""
            echo "$section"
          } > /tmp/release-body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release-body.md
          files: |
            dist/pinentry-dms-*.tar.gz
            dist/pinentry-dms-*.tar.gz.sha256
          fail_on_unmatched_files: true